<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="msapplication-navbutton-color" content="#0d1117">
  <title>Horarios de Melani</title>
</head>
<body>
  <header>
    <div class="logo">Melani <span>horarios</span></div>
    <div class="week-nav">
      <button data-action="prev-week">&#8592;</button>
      <span class="week-label" id="weekLabel"></span>
      <button data-action="next-week">&#8594;</button>
    </div>
    <button class="save-btn" id="saveBtn" style="display:none">Guardar cambios</button>
    <button class="pin-btn" id="editBtn">&#9998; Editar</button>
  </header>
  <main>
    <div class="grid" id="grid"></div>
  </main>
  <footer>Horarios de Melani &mdash; NCM Digital</footer>
  <div class="saved-toast" id="toast">&#10003; Guardado</div>
  <div class="pin-modal" id="pinModal">
    <div class="pin-box">
      <h3>Modo edición</h3>
      <p>Ingresá el PIN para editar</p>
      <input type="password" inputmode="numeric" maxlength="4" id="pinInput" placeholder="&#9679;&#9679;&#9679;&#9679;">
      <div class="pin-error" id="pinError"></div>
      <div class="pin-actions">
        <button class="btn-secondary" data-action="pin-cancel">Cancelar</button>
        <button class="btn-primary" data-action="pin-confirm">Entrar</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
