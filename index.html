<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios de Melani</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0d1117;min-height:100vh;color:#e6edf3}

  /* ── Header ── */
  header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:10}
  .logo{font-size:17px;font-weight:600;color:#818cf8;flex-shrink:0}
  .logo span{font-weight:400;color:#8b949e;font-size:14px;margin-left:6px}
  .week-nav{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
  .week-nav button{background:none;border:1px solid #30363d;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;color:#c9d1d9;transition:.15s;line-height:1}
  .week-nav button:hover{background:#21262d;border-color:#6366f1}
  .week-label{font-size:13px;font-weight:500;color:#c9d1d9;min-width:140px;text-align:center;white-space:nowrap}
  .pin-btn{font-size:13px;background:none;border:1px solid #30363d;border-radius:8px;padding:6px 12px;cursor:pointer;color:#8b949e;transition:.15s;flex-shrink:0}
  .pin-btn:hover{background:#21262d;border-color:#6366f1}
  .pin-btn.active{background:#1e1f3b;color:#818cf8;border-color:#6366f1}

  /* ── Layout ── */
  main{max-width:1020px;margin:20px auto;padding:0 14px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

  /* ── Day cards ── */
  .day-card{background:#161b22;border-radius:14px;border:1px solid #30363d;padding:14px;display:flex;flex-direction:column;gap:10px;transition:.2s}
  .day-card.today{border-color:#6366f1;box-shadow:0 0 0 2px #1e1f3b,0 0 16px rgba(99,102,241,.15)}
  .day-card.libre{opacity:.55}
  .day-card.libre .schedule-blocks{opacity:.3;pointer-events:none}
  .day-header{display:flex;justify-content:space-between;align-items:center}
  .day-name{font-size:13px;font-weight:600;color:#818cf8;text-transform:uppercase;letter-spacing:.05em}
  .day-date{font-size:12px;color:#6e7681}

  /* ── Libre toggle ── */
  .libre-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#8b949e}
  .libre-toggle input{accent-color:#6366f1;cursor:pointer}
  .libre-badge{font-size:11px;background:#1c2128;color:#8b949e;border:1px solid #30363d;border-radius:5px;padding:3px 8px;font-weight:500;text-align:center}

  /* ── Schedule blocks ── */
  .schedule-blocks{display:flex;flex-direction:column;gap:8px}
  .block{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:10px 10px 8px;min-width:0}
  .block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .block-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .block-manana .block-label{color:#34d399}
  .block-tarde  .block-label{color:#f59e0b}
  .block-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:#6e7681}
  .block-toggle input{accent-color:#6366f1;cursor:pointer}
  .block.inactive{opacity:.35}
  .block.inactive .time-rows{pointer-events:none}
  .time-rows{display:flex;flex-direction:column;gap:5px}
  .time-row{display:flex;align-items:center;gap:6px}
  .time-label{font-size:11px;color:#6e7681;width:32px;flex-shrink:0}
  .time-input{width:100%;border:1px solid #30363d;border-radius:7px;padding:5px 8px;font-size:13px;color:#c9d1d9;background:#161b22;outline:none;cursor:default;transition:.15s;color-scheme:dark}
  .time-input:focus{border-color:#818cf8;background:#0d1117;box-shadow:0 0 0 2px rgba(99,102,241,.2)}
  .time-input[readonly]{pointer-events:none;color:#6e7681}

  /* ── School select ── */
  .escuela-select{width:100%;border:1px solid #30363d;border-radius:7px;padding:5px 8px;font-size:12px;color:#c9d1d9;background:#161b22;outline:none;cursor:pointer;transition:.15s;color-scheme:dark;margin-bottom:6px}
  .escuela-select:focus{border-color:#818cf8;box-shadow:0 0 0 2px rgba(99,102,241,.2)}
  .escuela-select:disabled{color:#6e7681;cursor:default;opacity:.75}
  .escuela-select option{background:#161b22;color:#c9d1d9}

  /* ── Notes ── */
  .note-input{width:100%;border:1px solid #30363d;border-radius:7px;padding:7px 9px;font-size:12px;color:#c9d1d9;background:#0d1117;resize:none;outline:none;min-height:52px;cursor:default;font-family:inherit;line-height:1.5;transition:.15s}
  .note-input:focus{border-color:#818cf8;box-shadow:0 0 0 2px rgba(99,102,241,.2)}
  .note-input[readonly]{pointer-events:none;color:#6e7681}
  .note-input::placeholder{color:#3d444d}

  /* ── Save button ── */
  .save-btn{font-size:13px;background:#166534;border:1px solid #16a34a;border-radius:8px;padding:6px 14px;cursor:pointer;color:#4ade80;transition:.15s;flex-shrink:0;font-weight:600}
  .save-btn:hover{background:#15803d;border-color:#4ade80}

  footer{text-align:center;padding:20px 0 32px;font-size:12px;color:#3d444d}
  .saved-toast{position:fixed;bottom:20px;right:20px;background:#1e1f3b;color:#818cf8;border:1px solid #6366f1;border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:200}
  .saved-toast.show{opacity:1}

  /* ── PIN modal ── */
  .pin-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:16px}
  .pin-modal.open{display:flex}
  .pin-box{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px 24px;width:100%;max-width:300px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .pin-box h3{font-size:16px;font-weight:600;color:#e6edf3;margin-bottom:6px}
  .pin-box p{font-size:13px;color:#8b949e;margin-bottom:18px}
  .pin-box input{width:100%;border:1px solid #30363d;border-radius:9px;padding:10px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:10px;background:#0d1117;color:#e6edf3;color-scheme:dark}
  .pin-box input:focus{border-color:#818cf8;box-shadow:0 0 0 2px rgba(99,102,241,.25)}
  .pin-error{font-size:12px;color:#f85149;min-height:16px;margin-bottom:10px}
  .pin-actions{display:flex;gap:8px}
  .btn-primary{flex:1;background:#4f46e5;color:#fff;border:none;border-radius:9px;padding:10px;font-size:14px;cursor:pointer;font-weight:500;transition:.15s}
  .btn-primary:hover{background:#6366f1}
  .btn-secondary{flex:1;background:none;border:1px solid #30363d;border-radius:9px;padding:10px;font-size:14px;cursor:pointer;color:#8b949e;transition:.15s}
  .btn-secondary:hover{background:#21262d}

  /* ═══════════════════════════════
     RESPONSIVE BREAKPOINTS
  ═══════════════════════════════ */

  /* Tablet ancho (800–1020px): 3 columnas */
  @media(max-width:1020px) and (min-width:640px){
    .grid{grid-template-columns:repeat(3,1fr)}
  }

  /* Tablet chico (480–639px): 2 columnas, bloques lado a lado */
  @media(max-width:639px) and (min-width:480px){
    .grid{grid-template-columns:repeat(2,1fr)}
    .schedule-blocks{flex-direction:row}
    .schedule-blocks .block{flex:1}
  }

  /* Móvil (< 480px): 1 columna */
  @media(max-width:479px){
    .grid{grid-template-columns:1fr}
    main{padding:0 10px;margin:14px auto}

    /* Header: logo + botón en fila, nav abajo centrado */
    header{padding:10px 14px;gap:8px}
    .week-nav{order:3;width:100%;justify-content:center}
    .week-label{min-width:0;font-size:12px}

    /* Cards más compactas */
    .day-card{padding:12px;gap:8px}

    /* Bloques mañana/tarde lado a lado en móvil también */
    .schedule-blocks{flex-direction:row;gap:6px}
    .schedule-blocks .block{flex:1;padding:8px 7px 6px}
    .block-header{flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:6px}
    .time-label{width:28px;font-size:10px}
    .time-input{font-size:12px;padding:4px 5px}
  }
</style>
</head>
<body>
<header>
  <div class="logo">Melani <span>horarios</span></div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8592;</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">&#8594;</button>
  </div>
  <button class="save-btn" id="saveBtn" onclick="guardarCambios()" style="display:none">Guardar cambios</button>
  <button class="pin-btn" id="editBtn" onclick="toggleEdit()">&#9998; Editar</button>
</header>
<main>
  <div class="grid" id="grid"></div>
</main>
<footer>Horarios de Melani &mdash; NCM Digital</footer>
<div class="saved-toast" id="toast">&#10003; Guardado</div>
<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <h3>Modo edición</h3>
    <p>Ingresá el PIN para editar</p>
    <input type="password" inputmode="numeric" maxlength="4" id="pinInput" placeholder="&#9679;&#9679;&#9679;&#9679;" oninput="pinInput()">
    <div class="pin-error" id="pinError"></div>
    <div class="pin-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="checkPin()">Entrar</button>
    </div>
  </div>
</div>
<script>
// ── Config ──
const PIN = "1234";
const DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
const ESCUELAS = ["La Inmaculada", "Juan Marcos", "San Francisco", "Reemplazo"];

// ── Template base: horarios fijos de Melani ──
// Se aplica cuando una semana no tiene datos guardados en Supabase
const BASE_TEMPLATE = {
  1: { // Lunes
    manana: { activo: true,  escuela: "San Francisco", entrada: "08:10", salida: "09:40" },
    tarde:  { activo: false, escuela: "",              entrada: "14:00", salida: "18:00" },
    notas: "", libre: false
  },
  2: { // Martes
    manana: { activo: true,  escuela: "San Francisco", entrada: "07:30", salida: "12:40" },
    tarde:  { activo: true,  escuela: "Juan Marcos",   entrada: "14:55", salida: "18:00" },
    notas: "", libre: false
  },
  3: { // Miércoles
    manana: { activo: true,  escuela: "Juan Marcos",   entrada: "07:15", salida: "12:00" },
    tarde:  { activo: true,  escuela: "Juan Marcos",   entrada: "15:50", salida: "18:00" },
    notas: "", libre: false
  },
  4: { // Jueves
    manana: { activo: true,  escuela: "La Inmaculada", entrada: "07:00", salida: "08:35" },
    tarde:  { activo: false, escuela: "",              entrada: "14:00", salida: "18:00" },
    notas: "", libre: false
  },
  5: { // Viernes
    manana: { activo: true,  escuela: "La Inmaculada", entrada: "09:25", salida: "11:35" },
    tarde:  { activo: false, escuela: "",              entrada: "14:00", salida: "18:00" },
    notas: "", libre: false
  }
};
const SUPA_URL = "https://lqonvykasavrnnurxzys.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxxb252eWthc2F2cm5udXJ4enlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMjcyNjYsImV4cCI6MjA5MTcwMzI2Nn0.KoUnddch_4y8O_Yqv-fd_JHgo__UyIEPq4R7KV6nwGs";

let editMode = false;
let currentWeekOffset = 0;
let weekCache = {}; // caché en memoria para no repetir fetches

// ── Helpers de datos ──
function defaultDay(diaSemana = 1) {
  // diaSemana: 1=Lunes, 2=Martes, ..., 5=Viernes
  const template = BASE_TEMPLATE[diaSemana];
  if (!template) {
    // Fallback genérico si se pide un día fuera del rango
    return {
      manana: { activo: true, entrada: "08:00", salida: "12:00", escuela: "" },
      tarde:  { activo: true, entrada: "14:00", salida: "18:00", escuela: "" },
      notas: "", libre: false
    };
  }
  // Clonar para no mutar el template original
  return JSON.parse(JSON.stringify(template));
}

function buildSchoolOptions(selected) {
  const blank = `<option value="">— Escuela —</option>`;
  return blank + ESCUELAS.map(e =>
    `<option value="${e}" ${selected === e ? "selected" : ""}>${e}</option>`
  ).join("");
}

function migrateDay(dd) {
  if (!dd) return dd;
  // Formato antiguo: tenía entrada/salida en el nivel raíz
  if (dd.entrada !== undefined || dd.salida !== undefined) {
    return {
      manana: { activo: true, entrada: dd.entrada || "08:00", salida: dd.salida || "12:00", escuela: "" },
      tarde:  { activo: false, entrada: "14:00", salida: "18:00", escuela: "" },
      notas: dd.notas || "",
      libre: dd.libre || false
    };
  }
  // Asegurar campo escuela si falta (datos viejos sin ese campo)
  if (dd.manana && dd.manana.escuela === undefined) dd.manana.escuela = "";
  if (dd.tarde  && dd.tarde.escuela  === undefined) dd.tarde.escuela  = "";
  return dd;
}

// ── Supabase: carga y guarda ──
async function loadData(wk) {
  if (weekCache[wk] !== undefined) return weekCache[wk];
  try {
    const res = await fetch(
      `${SUPA_URL}/rest/v1/horarios?week_key=eq.${encodeURIComponent(wk)}&select=data`,
      { headers: { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY } }
    );
    const rows = await res.json();
    let data = rows.length > 0 ? rows[0].data : null;
    // Si no hay datos en Supabase, migrar desde localStorage (primera vez)
    if (!data) {
      try {
        const local = JSON.parse(localStorage.getItem("melani_" + wk));
        if (local && Object.keys(local).length > 0) {
          data = local;
          saveData(wk, data); // sube el dato local a la nube
        }
      } catch {}
    }
    weekCache[wk] = data || {};
  } catch {
    // Sin conexión: usar localStorage como fallback
    try { weekCache[wk] = JSON.parse(localStorage.getItem("melani_" + wk)) || {}; }
    catch { weekCache[wk] = {}; }
  }
  return weekCache[wk];
}

async function saveData(wk, data) {
  weekCache[wk] = data;
  try {
    await fetch(`${SUPA_URL}/rest/v1/horarios`, {
      method: "POST",
      headers: {
        "apikey": SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates"
      },
      body: JSON.stringify({ week_key: wk, data, updated_at: new Date().toISOString() })
    });
  } catch {
    // Sin conexión: guardar localmente como respaldo
    localStorage.setItem("melani_" + wk, JSON.stringify(data));
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg || "✓ Guardado";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ── Fechas ──
function getWeekDates(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  return Array.from({length: 5}, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}
function toDateKey(d) {
  // Formatea la fecha como YYYY-MM-DD en hora local (evita shift por UTC)
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
function weekKey(offset) {
  return toDateKey(getWeekDates(offset)[0]);
}
function formatDate(d) {
  return d.toLocaleDateString("es-AR", {day: "numeric", month: "short"});
}
function isToday(d) {
  const n = new Date();
  return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
}

// ── Render ──
async function renderWeek() {
  const wk = weekKey(currentWeekOffset);
  const dates = getWeekDates(currentWeekOffset);
  const data = await loadData(wk);
  const mon = dates[0], fri = dates[4];
  document.getElementById("weekLabel").textContent =
    formatDate(mon) + " – " + formatDate(fri) + " " + fri.getFullYear();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  dates.forEach((d, i) => {
    const key = toDateKey(d);
    let dd = migrateDay(data[key]) || defaultDay(i + 1);
    const today = isToday(d);
    const ro = editMode ? "" : "readonly";
    const dis = editMode ? "" : "disabled";

    const card = document.createElement("div");
    card.className = "day-card" + (today ? " today" : "") + (dd.libre ? " libre" : "");

    const mananaInactive = !dd.manana.activo ? " inactive" : "";
    const tardeInactive  = !dd.tarde.activo  ? " inactive" : "";

    card.innerHTML = `
      <div class="day-header">
        <span class="day-name">${DAYS[i]}</span>
        <span class="day-date">${formatDate(d)}</span>
      </div>
      <label class="libre-toggle">
        <input type="checkbox" ${dd.libre ? "checked" : ""} ${dis}
          onchange="toggleLibre('${key}','${wk}',this)">
        Día libre
      </label>
      ${dd.libre ? `<div class="libre-badge">Sin clases</div>` : `
      <div class="schedule-blocks">
        <!-- MAÑANA -->
        <div class="block block-manana${mananaInactive}" id="block-m-${key}">
          <div class="block-header">
            <span class="block-label">Mañana</span>
            <label class="block-toggle">
              <input type="checkbox" ${dd.manana.activo ? "checked" : ""} ${dis}
                onchange="toggleBloque('${key}','${wk}','manana',this)">
              Activo
            </label>
          </div>
          <select class="escuela-select" ${dis}
            onchange="saveField('${key}','${wk}','manana','escuela',this.value)">
            ${buildSchoolOptions(dd.manana.escuela || "")}
          </select>
          <div class="time-rows">
            <div class="time-row">
              <span class="time-label">Entra</span>
              <input class="time-input" type="time" value="${dd.manana.entrada}" ${ro}
                onchange="saveField('${key}','${wk}','manana','entrada',this.value)">
            </div>
            <div class="time-row">
              <span class="time-label">Sale</span>
              <input class="time-input" type="time" value="${dd.manana.salida}" ${ro}
                onchange="saveField('${key}','${wk}','manana','salida',this.value)">
            </div>
          </div>
        </div>
        <!-- TARDE -->
        <div class="block block-tarde${tardeInactive}" id="block-t-${key}">
          <div class="block-header">
            <span class="block-label">Tarde</span>
            <label class="block-toggle">
              <input type="checkbox" ${dd.tarde.activo ? "checked" : ""} ${dis}
                onchange="toggleBloque('${key}','${wk}','tarde',this)">
              Activo
            </label>
          </div>
          <select class="escuela-select" ${dis}
            onchange="saveField('${key}','${wk}','tarde','escuela',this.value)">
            ${buildSchoolOptions(dd.tarde.escuela || "")}
          </select>
          <div class="time-rows">
            <div class="time-row">
              <span class="time-label">Entra</span>
              <input class="time-input" type="time" value="${dd.tarde.entrada}" ${ro}
                onchange="saveField('${key}','${wk}','tarde','entrada',this.value)">
            </div>
            <div class="time-row">
              <span class="time-label">Sale</span>
              <input class="time-input" type="time" value="${dd.tarde.salida}" ${ro}
                onchange="saveField('${key}','${wk}','tarde','salida',this.value)">
            </div>
          </div>
        </div>
      </div>
      <textarea class="note-input" placeholder="Notas..." ${ro}
        onchange="saveNote('${key}','${wk}',this.value)">${dd.notas}</textarea>
      `}
    `;
    grid.appendChild(card);
  });
}

// ── Guardar campos ──
async function saveField(dateKey, wk, bloque, campo, val) {
  const data = await loadData(wk);
  if (!data[dateKey]) data[dateKey] = defaultDay();
  data[dateKey] = migrateDay(data[dateKey]) || defaultDay();
  data[dateKey][bloque][campo] = val;
  showToast();
  saveData(wk, data);
}

async function saveNote(dateKey, wk, val) {
  const data = await loadData(wk);
  if (!data[dateKey]) data[dateKey] = defaultDay();
  data[dateKey] = migrateDay(data[dateKey]) || defaultDay();
  data[dateKey].notas = val;
  showToast();
  saveData(wk, data);
}

async function toggleBloque(dateKey, wk, bloque, cb) {
  const data = await loadData(wk);
  if (!data[dateKey]) data[dateKey] = defaultDay();
  data[dateKey] = migrateDay(data[dateKey]) || defaultDay();
  data[dateKey][bloque].activo = cb.checked;
  showToast();
  saveData(wk, data);
  const prefix = bloque === "manana" ? "m" : "t";
  const blockEl = document.getElementById("block-" + prefix + "-" + dateKey);
  if (blockEl) blockEl.classList.toggle("inactive", !cb.checked);
}

async function toggleLibre(dateKey, wk, cb) {
  const data = await loadData(wk);
  if (!data[dateKey]) data[dateKey] = defaultDay();
  data[dateKey] = migrateDay(data[dateKey]) || defaultDay();
  data[dateKey].libre = cb.checked;
  showToast();
  saveData(wk, data);
  renderWeek();
}

// ── Navegación ──
function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeek();
}

// ── Modo edición ──
function toggleEdit() {
  if (editMode) {
    editMode = false;
    document.getElementById("editBtn").textContent = "✏ Editar";
    document.getElementById("editBtn").classList.remove("active");
    document.getElementById("saveBtn").style.display = "none";
    renderWeek();
  } else {
    document.getElementById("pinModal").classList.add("open");
    document.getElementById("pinInput").value = "";
    document.getElementById("pinError").textContent = "";
    setTimeout(() => document.getElementById("pinInput").focus(), 100);
  }
}
function checkPin() {
  const v = document.getElementById("pinInput").value;
  if (v === PIN) {
    editMode = true;
    document.getElementById("editBtn").textContent = "✓ Editando";
    document.getElementById("editBtn").classList.add("active");
    document.getElementById("saveBtn").style.display = "";
    closeModal();
    renderWeek();
  } else {
    document.getElementById("pinError").textContent = "PIN incorrecto";
    document.getElementById("pinInput").value = "";
  }
}
function guardarCambios() {
  editMode = false;
  document.getElementById("editBtn").textContent = "✏ Editar";
  document.getElementById("editBtn").classList.remove("active");
  document.getElementById("saveBtn").style.display = "none";
  showToast("✓ Cambios guardados");
  renderWeek();
}
function pinInput() {
  document.getElementById("pinError").textContent = "";
  if (document.getElementById("pinInput").value.length === 4) checkPin();
}
function closeModal() {
  document.getElementById("pinModal").classList.remove("open");
}
document.getElementById("pinModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
renderWeek();
</script>
</body>
</html>
