<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horarios de Melani</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f7fa;min-height:100vh;color:#1a1a2e}
  header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .logo{font-size:17px;font-weight:600;color:#4f46e5}
  .logo span{font-weight:400;color:#64748b;font-size:14px;margin-left:6px}
  .week-nav{display:flex;align-items:center;gap:10px}
  .week-nav button{background:none;border:1px solid #e2e8f0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px;color:#374151;transition:.15s}
  .week-nav button:hover{background:#f1f5f9}
  .week-label{font-size:14px;font-weight:500;color:#374151;min-width:160px;text-align:center}
  .pin-btn{font-size:13px;background:none;border:1px solid #e2e8f0;border-radius:8px;padding:6px 12px;cursor:pointer;color:#64748b;transition:.15s}
  .pin-btn:hover{background:#f1f5f9}
  .pin-btn.active{background:#eef2ff;color:#4f46e5;border-color:#c7d2fe}
  main{max-width:900px;margin:24px auto;padding:0 16px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
  .day-card{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px;display:flex;flex-direction:column;gap:10px;transition:.2s}
  .day-card.today{border-color:#818cf8;box-shadow:0 0 0 2px #eef2ff}
  .day-header{display:flex;justify-content:space-between;align-items:center}
  .day-name{font-size:13px;font-weight:600;color:#6366f1;text-transform:uppercase;letter-spacing:.05em}
  .day-date{font-size:12px;color:#94a3b8}
  .time-block{display:flex;flex-direction:column;gap:6px}
  .time-row{display:flex;align-items:center;gap:6px}
  .time-label{font-size:11px;color:#94a3b8;width:28px;flex-shrink:0}
  .time-input{width:100%;border:1px solid #e2e8f0;border-radius:7px;padding:5px 8px;font-size:13px;color:#1e293b;background:#f8fafc;outline:none;cursor:default}
  .time-input:focus{border-color:#818cf8;background:#fff;box-shadow:0 0 0 2px #eef2ff}
  .time-input[readonly]{pointer-events:none;background:#f8fafc;color:#475569}
  .note-input{width:100%;border:1px solid #e2e8f0;border-radius:7px;padding:7px 9px;font-size:12px;color:#374151;background:#f8fafc;resize:none;outline:none;min-height:60px;cursor:default;font-family:inherit;line-height:1.5}
  .note-input:focus{border-color:#818cf8;background:#fff;box-shadow:0 0 0 2px #eef2ff}
  .note-input[readonly]{pointer-events:none;background:#f8fafc}
  .libre-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b}
  .libre-toggle input{accent-color:#6366f1}
  .day-card.libre{opacity:.6}
  .day-card.libre .time-block{opacity:.35;pointer-events:none}
  .libre-badge{font-size:11px;background:#fef9c3;color:#854d0e;border-radius:5px;padding:2px 7px;font-weight:500}
  footer{text-align:center;padding:20px 0 32px;font-size:12px;color:#94a3b8}
  .saved-toast{position:fixed;bottom:20px;right:20px;background:#4f46e5;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;transition:.3s;pointer-events:none}
  .saved-toast.show{opacity:1}
  .pin-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
  .pin-modal.open{display:flex}
  .pin-box{background:#fff;border-radius:16px;padding:28px 24px;width:280px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .pin-box h3{font-size:16px;font-weight:600;color:#1e293b;margin-bottom:6px}
  .pin-box p{font-size:13px;color:#64748b;margin-bottom:18px}
  .pin-box input{width:100%;border:1px solid #e2e8f0;border-radius:9px;padding:10px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:10px}
  .pin-box input:focus{border-color:#818cf8;box-shadow:0 0 0 2px #eef2ff}
  .pin-error{font-size:12px;color:#ef4444;min-height:16px;margin-bottom:10px}
  .pin-actions{display:flex;gap:8px}
  .btn-primary{flex:1;background:#4f46e5;color:#fff;border:none;border-radius:9px;padding:10px;font-size:14px;cursor:pointer;font-weight:500}
  .btn-secondary{flex:1;background:none;border:1px solid #e2e8f0;border-radius:9px;padding:10px;font-size:14px;cursor:pointer;color:#64748b}
</style>
</head>
<body>
<header>
  <div class="logo">Melani <span>horarios</span></div>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">&#8592;</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">&#8594;</button>
  </div>
  <button class="pin-btn" id="editBtn" onclick="toggleEdit()">&#9998; Editar</button>
</header>
<main>
  <div class="grid" id="grid"></div>
</main>
<footer>Horarios de Melani &mdash; NCM Digital</footer>
<div class="saved-toast" id="toast">Guardado</div>
<div class="pin-modal" id="pinModal">
  <div class="pin-box">
    <h3>Modo edición</h3>
    <p>Ingresá el PIN para editar</p>
    <input type="password" inputmode="numeric" maxlength="4" id="pinInput" placeholder="&#9679;&#9679;&#9679;&#9679;" oninput="pinInput()">
    <div class="pin-error" id="pinError"></div>
    <div class="pin-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="checkPin()">Entrar</button>
    </div>
  </div>
</div>
<script>
const PIN = "1234";
const DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
let editMode = false;
let currentWeekOffset = 0;
function getWeekDates(offset){
  const now = new Date();
  const day = now.getDay();
  const diff = (day===0?-6:1-day);
  const mon = new Date(now);
  mon.setDate(now.getDate()+diff+offset*7);
  return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
}
function weekKey(offset){
  const dates = getWeekDates(offset);
  return dates[0].toISOString().slice(0,10);
}
function loadData(wk){
  try{return JSON.parse(localStorage.getItem("melani_"+wk))||{}}catch{return{}}
}
function saveData(wk,data){
  localStorage.setItem("melani_"+wk,JSON.stringify(data));
  showToast();
}
function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1800);
}
function formatDate(d){
  return d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
}
function isToday(d){
  const n=new Date();
  return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
}
function renderWeek(){
  const wk = weekKey(currentWeekOffset);
  const dates = getWeekDates(currentWeekOffset);
  const data = loadData(wk);
  const mon = dates[0], fri = dates[4];
  document.getElementById("weekLabel").textContent =
    formatDate(mon)+" – "+formatDate(fri)+" "+fri.getFullYear();
  const grid = document.getElementById("grid");
  grid.innerHTML="";
  dates.forEach((d,i)=>{
    const key = d.toISOString().slice(0,10);
    const dd = data[key]||{entrada:"07:00",salida:"18:00",notas:"",libre:false};
    const today = isToday(d);
    const ro = editMode?"":"readonly";
    const card = document.createElement("div");
    card.className="day-card"+(today?" today":"")+(dd.libre?" libre":"");
    card.innerHTML=`
      <div class="day-header">
        <span class="day-name">${DAYS[i]}</span>
        <span class="day-date">${formatDate(d)}</span>
      </div>
      <label class="libre-toggle">
        <input type="checkbox" ${dd.libre?"checked":""} ${editMode?"":"disabled"}
          onchange="toggleLibre('${key}','${wk}',this)">
        Día libre
      </label>
      ${dd.libre?`<span class="libre-badge">Sin clases</span>`:`
      <div class="time-block">
        <div class="time-row">
          <span class="time-label">Entra</span>
          <input class="time-input" type="time" value="${dd.entrada}" min="07:00" max="18:00" ${ro}
            onchange="saveField('${key}','${wk}','entrada',this.value)">
        </div>
        <div class="time-row">
          <span class="time-label">Sale</span>
          <input class="time-input" type="time" value="${dd.salida}" min="07:00" max="18:00" ${ro}
            onchange="saveField('${key}','${wk}','salida',this.value)">
        </div>
      </div>
      <textarea class="note-input" placeholder="Notas..." ${ro}
        onchange="saveField('${key}','${wk}','notas',this.value)">${dd.notas}</textarea>
      `}
    `;
    grid.appendChild(card);
  });
}
function saveField(dateKey,wk,field,val){
  const data=loadData(wk);
  if(!data[dateKey])data[dateKey]={entrada:"07:00",salida:"18:00",notas:"",libre:false};
  data[dateKey][field]=val;
  saveData(wk,data);
}
function toggleLibre(dateKey,wk,cb){
  const data=loadData(wk);
  if(!data[dateKey])data[dateKey]={entrada:"07:00",salida:"18:00",notas:"",libre:false};
  data[dateKey].libre=cb.checked;
  saveData(wk,data);
  renderWeek();
}
function changeWeek(dir){
  currentWeekOffset+=dir;
  renderWeek();
}
function toggleEdit(){
  if(editMode){
    editMode=false;
    document.getElementById("editBtn").textContent="✏ Editar";
    document.getElementById("editBtn").classList.remove("active");
    renderWeek();
  } else {
    document.getElementById("pinModal").classList.add("open");
    document.getElementById("pinInput").value="";
    document.getElementById("pinError").textContent="";
    setTimeout(()=>document.getElementById("pinInput").focus(),100);
  }
}
function checkPin(){
  const v=document.getElementById("pinInput").value;
  if(v===PIN){
    editMode=true;
    document.getElementById("editBtn").textContent="✓ Editando";
    document.getElementById("editBtn").classList.add("active");
    closeModal();
    renderWeek();
  } else {
    document.getElementById("pinError").textContent="PIN incorrecto";
    document.getElementById("pinInput").value="";
  }
}
function pinInput(){
  document.getElementById("pinError").textContent="";
  if(document.getElementById("pinInput").value.length===4)checkPin();
}
function closeModal(){
  document.getElementById("pinModal").classList.remove("open");
}
document.getElementById("pinModal").addEventListener("click",function(e){
  if(e.target===this)closeModal();
});
renderWeek();
</script>
</body>
</html>
